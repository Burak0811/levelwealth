<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0A14"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#9D174D"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow circle -->
  <circle cx="600" cy="280" r="200" fill="#7C3AED" opacity="0.08" filter="url(#glow)"/>

  <!-- Icon background -->
  <rect x="516" y="130" width="168" height="168" rx="40" fill="url(#grad)"/>

  <!-- Lumio bolt icon -->
  <g transform="translate(516,130)">
    <path fill="white" d="M94.4 148.1c-1.8 2.2-5.4 1-5.4-1.9v-29.1a6 6 0 0 0-6-6H54.3c-2.4 0-3.9-2.8-2.5-4.8l19.9-27.9c2.8-4-0-9.5-4.9-9.5H33.1c-2.4 0-3.9-2.8-2.5-4.8L52.4 37.6c.6-.8 1.5-1.3 2.4-1.3h76.9c2.4 0 3.9 2.8 2.5 4.8l-19.9 27.9c-2.8 4 0 9.5 4.9 9.5h30.3c2.5 0 3.9 2.9 2.4 4.9L94.4 148.1z"/>
  </g>

  <!-- Brand name -->
  <text x="600" y="355" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="72" font-weight="900" letter-spacing="12" fill="white">LUMIO</text>

  <!-- Tagline -->
  <text x="600" y="415" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="400" fill="#a78bfa">Kostenlose Finanzbildung für Einsteiger</text>

  <!-- Features row -->
  <g transform="translate(280, 470)">
    <rect width="180" height="48" rx="24" fill="#7C3AED22" stroke="#7C3AED55" stroke-width="1"/>
    <text x="90" y="30" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#a78bfa">📚 ETFs lernen</text>
  </g>
  <g transform="translate(510, 470)">
    <rect width="180" height="48" rx="24" fill="#7C3AED22" stroke="#7C3AED55" stroke-width="1"/>
    <text x="90" y="30" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#a78bfa">🎯 Challenges</text>
  </g>
  <g transform="translate(740, 470)">
    <rect width="180" height="48" rx="24" fill="#7C3AED22" stroke="#7C3AED55" stroke-width="1"/>
    <text x="90" y="30" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#a78bfa">⚡ Kostenlos</text>
  </g>

  <!-- URL -->
  <text x="600" y="580" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#6b7280">lumio.app</text>
</svg>
