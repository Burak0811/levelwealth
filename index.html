    <style>
      body { background-color: #0D0A14; }
      #splash {
        position: fixed; inset: 0;
        background: #0D0A14;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.45s ease;
      }
      #splash-logo {
        display: flex; flex-direction: column; align-items: center; gap: 14px;
        animation: splash-in 0.6s cubic-bezier(0.22,1,0.36,1) both;
      }
      #splash-icon {
        width: 72px; height: 72px; border-radius: 22px;
        background: linear-gradient(135deg,#7C3AED,#9D174D);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 0 40px #7C3AED55;
      }
      #splash-wordmark {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
        font-size: 28px; font-weight: 900; letter-spacing: 0.08em;
        color: #fff;
      }
      @keyframes splash-in {
        from { opacity: 0; transform: scale(0.88); }
        to   { opacity: 1; transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-logo">
        <div id="splash-icon">
          <svg width="38" height="36" viewBox="0 0 48 46" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill="#fff" d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"/>
          </svg>
        </div>
        <span id="splash-wordmark">LUMIO</span>
      </div>
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var s = document.getElementById('splash')
          if (s) { s.style.opacity = '0'; setTimeout(function(){ s.remove() }, 450) }
        }, 1200)
      })
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
